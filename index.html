<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen — Unsplash Wallpaper Studio</title>
    <meta name="description" content="Discover and download high-quality wallpapers from Unsplash with elegant filtering and one-click bulk export.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="glow glow--1" aria-hidden="true"></div>
    <div class="glow glow--2" aria-hidden="true"></div>

    <div class="container">
        <header class="site-header">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">◐</span>
                <span class="brand-name">Lumen</span>
            </div>
            <button id="settingsBtn" class="ghost-btn" title="API key settings" aria-label="API key settings">
                <span class="ghost-btn__dot" aria-hidden="true"></span>
                <span class="ghost-btn__label">API Key</span>
            </button>
        </header>

        <section class="hero">
            <p class="hero-eyebrow">Unsplash Wallpaper Studio</p>
            <h1 class="hero-title">Curate light.<br><em>Download beauty.</em></h1>
            <p class="hero-sub">Search a world of high-resolution photography, filter by orientation and quality, then export single shots or a whole collection — credits included.</p>
        </section>

        <section class="controls">
            <div class="search-section">
                <div class="search-field">
                    <span class="search-icon" aria-hidden="true">⌕</span>
                    <input type="search" id="searchInput" aria-label="Search wallpapers"
                           placeholder="Try “misty mountains”, “neon city”, “linen texture”…"
                           autocomplete="off" enterkeyhint="search">
                </div>
                <button id="searchBtn" class="btn btn--primary">Search</button>
                <button id="randomBtn" class="btn btn--ghost">Surprise me</button>
            </div>

            <div class="suggestions" id="suggestions" aria-label="Quick searches">
                <button type="button" class="chip" data-q="mountains">Mountains</button>
                <button type="button" class="chip" data-q="ocean waves">Ocean</button>
                <button type="button" class="chip" data-q="forest fog">Forest</button>
                <button type="button" class="chip" data-q="city night">City</button>
                <button type="button" class="chip" data-q="minimal abstract">Minimal</button>
                <button type="button" class="chip" data-q="space galaxy">Space</button>
                <button type="button" class="chip" data-q="desert dunes">Desert</button>
                <button type="button" class="chip" data-q="flowers macro">Flowers</button>
            </div>

            <div class="filter-row">
                <div class="filter-group">
                    <label for="orientation">Orientation</label>
                    <div class="select-wrap">
                        <select id="orientation">
                            <option value="portrait">Portrait</option>
                            <option value="landscape">Landscape</option>
                            <option value="squarish">Square</option>
                        </select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="count">Count</label>
                    <div class="select-wrap">
                        <select id="count">
                            <option value="10">10 photos</option>
                            <option value="20">20 photos</option>
                            <option value="30" selected>30 photos</option>
                            <option value="50">50 photos</option>
                            <option value="100">100 photos</option>
                        </select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="quality">Quality</label>
                    <div class="select-wrap">
                        <select id="quality">
                            <option value="regular">Regular</option>
                            <option value="full" selected>High</option>
                            <option value="raw">Raw (max)</option>
                        </select>
                    </div>
                </div>

                <div class="filter-actions">
                    <button id="selectAllBtn" class="btn btn--ghost" disabled>Select all</button>
                    <button id="downloadAllBtn" class="btn btn--accent" disabled>Download selected</button>
                    <button id="clearBtn" class="btn btn--ghost btn--icon" title="Clear gallery">Clear</button>
                </div>
            </div>
        </section>

        <div class="status" id="status" role="status" aria-live="polite"></div>

        <main class="gallery" id="gallery"></main>

        <div class="load-more-wrap" id="loadMoreWrap" hidden>
            <button id="loadMoreBtn" class="btn btn--ghost">Load more</button>
        </div>
    </div>

    <div class="selection-bar" id="selectionBar" hidden>
        <span class="selection-bar__count"><strong id="selectionCount">0</strong> selected</span>
        <div class="selection-bar__actions">
            <button id="barDownloadBtn" class="btn btn--accent">Download ZIP</button>
            <button id="barDeselectBtn" class="btn btn--ghost">Deselect all</button>
        </div>
    </div>

    <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Photo preview">
        <div class="lightbox__backdrop" data-action="close"></div>
        <button class="lightbox__close" id="lbClose" type="button" aria-label="Close preview">✕</button>
        <button class="lightbox__nav lightbox__nav--prev" id="lbPrev" type="button" aria-label="Previous photo">‹</button>
        <button class="lightbox__nav lightbox__nav--next" id="lbNext" type="button" aria-label="Next photo">›</button>
        <figure class="lightbox__figure">
            <div class="lightbox__stage">
                <span class="lightbox__spinner" id="lbSpinner" aria-hidden="true"></span>
                <img id="lbImg" alt="">
            </div>
            <figcaption class="lightbox__meta">
                <div class="lightbox__info">
                    <span class="lightbox__author" id="lbAuthor"></span>
                    <span class="lightbox__desc" id="lbDesc"></span>
                </div>
                <div class="lightbox__actions">
                    <a id="lbUnsplash" class="btn btn--ghost" target="_blank" rel="noopener">View on Unsplash</a>
                    <button id="lbDownload" class="btn btn--primary" type="button">Download</button>
                </div>
            </figcaption>
        </figure>
    </div>

    <footer class="site-footer">
        <span>Photos via <a href="https://unsplash.com" target="_blank" rel="noopener">Unsplash</a></span>
        <span class="dot">•</span>
        <span>Crafted with care</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="config.js" onerror="this.dataset.failed=1"></script>
    <script src="script.js"></script>
</body>
</html>
